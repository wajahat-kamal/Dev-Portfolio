<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Todo List</h1>
    <div class="container">
      <div class="box">
        <button class="btnbox">Add new task</button>
      </div>

      <div class="dabba hide">
        <svg
          class="close-icon"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 48 48"
          width="48px"
          height="48px"
        >
          <path
            fill="#F44336"
            d="M21.5 4.5H26.501V43.5H21.5z"
            transform="rotate(45.001 24 24)"
          />
          <path
            fill="#F44336"
            d="M21.5 4.5H26.5V43.501H21.5z"
            transform="rotate(135.008 24 24)"
          />
        </svg>

        <div>
          <h3>Title</h3>
          <input type="text" id="title" />
        </div>
        <div class="dttimh3">
          <h3>Date&Time</h3>
          <input type="datetime-local" id="dattime" />
        </div>
        <div class="teh3">
          <h3>Enter your task</h3>
          <textarea name="" id="text"></textarea>
        </div>
        <button class="lastbtn">Add Task</button>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
