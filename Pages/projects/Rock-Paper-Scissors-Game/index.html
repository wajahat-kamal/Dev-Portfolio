<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
   <div class="header"><h1>Rock Paper Scissors</h1></div>

    <div class="images">
        <div class="img" id="rock"><img src="rock.png" alt="rock.png"></div>
        <div class="img" id="paper"><img src="paper.png" alt="paper.png"></div>
        <div class="img" id="scissors"><img src="scissors.png" alt="scissors.png"></div>
    </div>
 
    <div class="score-board">

    <div class="score">
        <p id="user-score">0</p>
        <h2>YOUR SCORE</h2>
    </div>

    <div class="score">
        <p id="computer-score">0</p>
        <h2>COMPUTER SCORE</h2>
    </div>

    </div>

    <div class="result">
        <p id="msg">Play your move</p>
    </div>

<script src="script.js"></script>
</body>
</html>
