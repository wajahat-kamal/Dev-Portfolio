<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in & Sign up Page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>
<body>
    
    <div class="container">


        <div class="card">

            <h1 class="title">Sign up</h1>
            <div class="line"></div>

            <form>
                <div class="name" id="input-field">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Name">
                </div>
                <div class="email" id="input-field">
                    <i class="fa-solid fa-at"></i>
                    <input type="email" placeholder="Email">
                </div>
                <div class="password" id="input-field">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" placeholder="Password">
                </div>

                <p><span class="forgot">Password Suggestions</span><a href="#"> Click Here!</a></p>
            </form>
        
            <div class="btn">
            <button type="button" id="signup">Sign up</button>
            <button type="button" class="disabled" id="signin">Sign in</button>
            </div>

        </div>

    </div>



    <script src="script.js"></script>
</body>
</html>
