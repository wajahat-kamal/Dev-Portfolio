<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculater</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="171352_calculator_icon.png" type="image/x-icon">
</head>
<body>

  <div class="container">
      <form>
        <div>
          <input class="display" type="text" name="display">
        </div>
        <div class="buttons">
          <input class="button ac" type="button" value="AC" onclick="display.value = ''" class="operator">
          <input class="button de" type="button" value="DE" onclick="display.value = display.value.toString().slice(0,-1)" class="operator">

          <input class="button add" type="button" value="+" onclick="display.value += '+'" class="operator">
          <input class="button subtract" type="button" value="-" onclick="display.value += '-'" class="operator">
          <input class="button multiply" type="button" value="x" onclick="display.value += '*'" class="operator">
          <input class="button divide" type="button" value="/" onclick="display.value += '/'" class="operator">
        

          <input class="button one" type="button" value="1" onclick="display.value += '1'">
          <input class="button two" type="button" value="2" onclick="display.value += '2'">
          <input class="button three" type="button" value="3" onclick="display.value += '3'">
          <input class="button four" type="button" value="4" onclick="display.value += '4'">
          <input class="button five" type="button" value="5" onclick="display.value += '5'">
          <input class="button six" type="button" value="6" onclick="display.value += '6'">
          <input class="button seven" type="button" value="7" onclick="display.value += '7'">
          <input class="button eight" type="button" value="8" onclick="display.value += '8'">
          <input class="button nine" type="button" value="9" onclick="display.value += '9'">
          <input class="button zero" type="button" value="0" onclick="display.value += '0'">
          
          
          <input class="button dot" type="button" value="." onclick="display.value += '.'">
          <input type="button" value="=" onclick="display.value = eval(display.value)" class="equal">
        </div>
        <div>
          <!-- <input type="button" value="4" onclick="display.value += '4'"> -->
  
</body>
<script src="script.js"></script>
</html>
